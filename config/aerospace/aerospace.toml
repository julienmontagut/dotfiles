# AeroSpace tiling window manager configuration
# See: https://nikitabobko.github.io/AeroSpace/guide
config-version = 2

# Start at login
start-at-login = true

# Default layout: fullscreen (accordion with no peek padding)
default-root-container-layout = 'accordion'
accordion-padding = 16

# Keyboard layout preset for Dvorak
key-mapping.preset = "dvorak"

# Mouse / focus coupling: focus follows the mouse, and the mouse lazily
# follows keyboard focus (window/workspace and monitor changes).
focus-follows-mouse.enabled = true
on-focus-changed = ['move-mouse window-lazy-center']
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Gaps configuration
[gaps]
outer.top = 8
outer.bottom = 8
outer.left = 8
outer.right = 8
inner.vertical = 8
inner.horizontal = 8

# =============================================================================
# Main mode bindings
# =============================================================================

[mode.main.binding]
# Workspace switching (number keys switch positionally; workspaces are named
# by usage: g general, c comms, r reference/web/dev-secondary, d dev, m misc)
cmd-ctrl-alt-1 = "workspace g"   # general / default
cmd-ctrl-alt-2 = "workspace c"   # communications
cmd-ctrl-alt-3 = "workspace r"   # reference, web, dev secondary
cmd-ctrl-alt-4 = "workspace d"   # dev primary
cmd-ctrl-alt-5 = "workspace m"   # misc, quick space

# Move window to workspace
cmd-ctrl-alt-shift-1 = "move-node-to-workspace g"
cmd-ctrl-alt-shift-2 = "move-node-to-workspace c"
cmd-ctrl-alt-shift-3 = "move-node-to-workspace r"
cmd-ctrl-alt-shift-4 = "move-node-to-workspace d"
cmd-ctrl-alt-shift-5 = "move-node-to-workspace m"

# Focus navigation (vim-style)
cmd-ctrl-alt-h = "focus left"
cmd-ctrl-alt-j = "focus down"
cmd-ctrl-alt-k = "focus up"
cmd-ctrl-alt-l = "focus right"

# Move window (vim-style)
cmd-ctrl-alt-shift-h = "move left"
cmd-ctrl-alt-shift-j = "move down"
cmd-ctrl-alt-shift-k = "move up"
cmd-ctrl-alt-shift-l = "move right"

# Layout: set split direction, toggle, tabbed, floating, fullscreen.
# A pane can't be spawned empty - set the direction, then open a window.
cmd-ctrl-alt-s = "layout tiles horizontal"          # split horizontal (sway splith)
cmd-ctrl-alt-v = "layout tiles vertical"            # split vertical (sway splitv)
cmd-ctrl-alt-e = "layout tiles horizontal vertical" # toggle split orientation
cmd-ctrl-alt-t = "layout accordion horizontal"      # tabbed
cmd-ctrl-alt-w = "layout floating tiling"           # floating toggle
cmd-ctrl-alt-f = "fullscreen"                       # fullscreen

# Modes
cmd-ctrl-alt-r = "mode resize"
cmd-ctrl-alt-o = "mode open"

# Window management
cmd-ctrl-alt-shift-q = "close"
cmd-ctrl-alt-shift-c = "reload-config"

# Terminal (new ghostty window in the existing process) and launcher (Spotlight)
cmd-ctrl-alt-enter = "exec-and-forget open -na Ghostty"
cmd-ctrl-alt-space = "exec-and-forget osascript -e 'tell application \"System Events\" to key code 49 using command down'"

# =============================================================================
# Resize mode bindings
# =============================================================================

[mode.resize.binding]
# resize smart picks the axis from the container orientation; 100px steps
h = "resize smart -100"
j = "resize smart -100"
k = "resize smart +100"
l = "resize smart +100"
0 = "balance-sizes"

esc = "mode main"
enter = "mode main"

# =============================================================================
# Open mode bindings (app launchers)
# =============================================================================

[mode.open.binding]
b = ["exec-and-forget open -a 'Google Chrome'", "mode main"]   # browser
t = ["exec-and-forget open -na Ghostty", "mode main"]          # terminal
z = ["exec-and-forget open -a Zed", "mode main"]
l = ["exec-and-forget open -a Linear", "mode main"]
s = ["exec-and-forget open -a Slite", "mode main"]
x = ["exec-and-forget open -a Xcode", "mode main"]
m = ["exec-and-forget open -a Mail", "mode main"]
comma = ["exec-and-forget open -a 'System Settings'", "mode main"]

esc = "mode main"
