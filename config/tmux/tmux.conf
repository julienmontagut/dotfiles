# Leader key: Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Terminal settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g focus-events on

# Window management (prefix: tmux "windows" ≈ vim "tabs")
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window
bind w choose-tree -Zw

# Panes management
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Session management
bind t command-prompt -p "New session:" "new-session -s '%%'"
bind BSpace kill-session

# Utilities
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"
bind y copy-mode

# Copy mode (vi keys)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar
set -g status-left "#[bold] #S "
set -g status-right " %H:%M "
set -g status-left-length 20
setw -g window-status-format "#[fg=brightblack] #I:#W #[default]"
setw -g window-status-current-format "#[bold] #I:#W #[default]"

# Ctrl+W pane management (seamless with neovim via vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-w if-shell "$is_vim" "send-keys C-w" "switch-client -T ctrl-w"

# Navigation
bind -T ctrl-w h select-pane -L
bind -T ctrl-w j select-pane -D
bind -T ctrl-w k select-pane -U
bind -T ctrl-w l select-pane -R
bind -T ctrl-w w select-pane -t +

# Close / manage
bind -T ctrl-w q kill-pane
bind -T ctrl-w o kill-pane -a
bind -T ctrl-w x swap-pane -D

# Layout
bind -T ctrl-w = select-layout tiled
bind -T ctrl-w r rotate-window

# Resize
bind -T ctrl-w + resize-pane -U 5
bind -T ctrl-w - resize-pane -D 5
bind -T ctrl-w < resize-pane -L 5
bind -T ctrl-w > resize-pane -R 5

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Bootstrap TPM if not installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

set -g @continuum-restore 'on'
