# Leader key: Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Terminal settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g focus-events on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits (open in current path)
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# Session management
bind n command-prompt -p "New session:" "new-session -s '%%'"
bind BSpace kill-session

# Copy mode (vi keys)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar
set -g status-position top
set -g status-left "#[bold] #S "
set -g status-right " %H:%M "
set -g status-left-length 20
setw -g window-status-format "#[fg=brightblack] #I:#W #[default]"
setw -g window-status-current-format "#[bold] #I:#W #[default]"


# Ctrl+W navigation (seamless with neovim via vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-w if-shell "$is_vim" "send-keys C-w" "switch-client -T ctrl-w"
bind -T ctrl-w h select-pane -L
bind -T ctrl-w j select-pane -D
bind -T ctrl-w k select-pane -U
bind -T ctrl-w l select-pane -R

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# Bootstrap TPM if not installed
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
