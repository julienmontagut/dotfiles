[settings]
lockfile = true
idiomatic_version_file_enable_tools = [
    "dotnet",
    "opentofu",
    "rust"
]

[settings.github]
use_git_credentials = true

[bootstrap.user]
login_shell = "/bin/zsh"

[tools]
bat = "latest"
bitwarden = "latest"
claude-code = "latest"
dua = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
gh = "latest"
glow = "latest"
jj = "latest"
jq = "latest"
just = "latest"
lazygit = "latest"
mprocs = "latest"
neovim = "latest"
ripgrep = "latest"
scaleway = "latest"
starship = "latest"
tmux = "latest"
tree-sitter = "latest"
xh = "latest"
zellij = "latest"
zoxide = "latest"

# Install dependencies
rust = "latest"
cargo-binstall = "latest"

# CLI tools out of the registry
"cargo:bacon" = "latest"
"cargo:forgejo-cli" = "latest"
"aqua:maaslalani/slides" = "latest"

# Lilex Nerd Font, named by the ghostty/alacritty/wezterm/fuzzel configs. No apt package
# exists. Pinned: a font has no reason to chase releases, and each bump re-downloads ~30MB.
# config/fontconfig points fontconfig at the install dir, which it doesn't scan by default.
"github:ryanoasis/nerd-fonts" = { version = "3.4.0", asset_pattern = "Lilex.zip" }
herdr = "latest"
