# Starship prompt configuration
# See: https://starship.rs/config/

# Minimal prompt - let starship detect context automatically
# Most modules are enabled by default and work well

# Reduce prompt delay
command_timeout = 500

# Prompt format (default is good, but we can customize)
format = """
$directory\
$git_branch\
$git_status\
$kubernetes\
$docker_context\
$package\
$rust\
$lua\
$nodejs\
$python\
$terraform\
$direnv\
$cmd_duration\
$line_break\
$character"""

# Directory
[directory]
truncation_length = 3
truncate_to_repo = true

# Git
[git_branch]
format = "[$symbol$branch]($style) "

[git_status]
format = '([$all_status$ahead_behind]($style) )'

# Character (prompt symbol)
[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold green)"

# Command duration
[cmd_duration]
min_time = 2000
format = "[$duration]($style) "

# Kubernetes
[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "k8s:"

# Direnv
[direnv]
disabled = false
format = "[$symbol$loaded]($style) "
symbol = ""
