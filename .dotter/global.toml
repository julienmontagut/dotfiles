# Dotter global configuration
# See: https://github.com/SuperCuber/dotter

[settings]
# Pre/post deploy hooks (optional)
# pre_deploy = "scripts/pre-deploy.sh"
# post_deploy = "scripts/post-deploy.sh"

# Shared files (all platforms)
#
[default.files]
"Brewfile" = "~/.Brewfile"
"claude/agents" = { target = "~/.claude/agents", type = "symbolic", recurse = false }
"claude/CLAUDE.md" = "~/.claude/CLAUDE.md"
"claude/settings.json" = "~/.claude/settings.json"
"claude/skills" = { target = "~/.claude/skills", type = "symbolic", recurse = false }
"config/alacritty" = "~/.config/alacritty"
"config/git" = "~/.config/git"
"config/ideavim" = "~/.config/ideavim"
"config/nvim" = { target = "~/.config/nvim", type = "symbolic", recurse = false }
"config/sesh" = "~/.config/sesh"
"config/starship.toml" = "~/.config/starship.toml"
"config/tmux" = "~/.config/tmux"
"config/wezterm" = "~/.config/wezterm"
"config/zed" = "~/.config/zed"
"config/zsh/.zshenv" = "~/.zshenv"
"config/zsh/.zshrc" = "~/.config/zsh/.zshrc"
"config/zsh/aliases.zsh" = "~/.config/zsh/aliases.zsh"

# macOS-specific files
# 
[macos]
depends = [
  "default"
]

[macos.files]
"config/aerospace" = "~/.config/aerospace"
"config/borders" = "~/.config/borders"
"config/karabiner" = "~/.config/karabiner"

# Linux-specific files
#
[linux]
depends = [
  "default"
]

[linux.files]
"config/fuzzel" = "~/.config/fuzzel"
"config/kanshi" = "~/.config/kanshi"
"config/keyd" = "~/.config/keyd"
"config/sway" = "~/.config/sway"
"config/waybar" = "~/.config/waybar"

