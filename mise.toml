# Provisioning manifest — the dotfiles symlink map + bootstrap task, loaded only
# from inside this clone (run `mise bootstrap` here). The global user environment
# (settings + tools) lives in config/mise/config.toml, which the [dotfiles] entry
# below symlinks to ~/.config/mise/config.toml so tools are active everywhere.
# `dotfiles.root = "{{ config_root }}"` follows whichever clone you bootstrap from.
[settings]
dotfiles.root = "{{ config_root }}"
dotfiles.default_mode = "symlink"

# Default is a whole-dir `symlink`; `symlink-each` (dir stays real, files linked
# individually) is used only where the target also holds non-repo files: git
# state, tmux plugins, Zed themes.
[dotfiles]
"~/.Brewfile"                = "Brewfile"
"~/.local/bin/tx"            = "bin/tx"
"~/.claude/agents"           = "claude/agents"
"~/.claude/CLAUDE.md"        = "claude/CLAUDE.md"
"~/.claude/settings.json"    = "claude/settings.json"
"~/.claude/skills"           = "claude/skills"
"~/.config/alacritty"        = "config/alacritty"
"~/.config/ghostty"          = "config/ghostty"
"~/.config/git"              = { source = "config/git", mode = "symlink-each" }
"~/.config/ideavim"          = "config/ideavim"
"~/.config/mise/config.toml" = "config/mise/config.toml"
"~/.config/nvim"             = "config/nvim"
"~/.config/sesh"             = "config/sesh"
"~/.config/starship.toml"    = "config/starship.toml"
"~/.config/tmux"             = { source = "config/tmux", mode = "symlink-each" }
"~/.config/wezterm"          = "config/wezterm"
"~/.config/zed"              = { source = "config/zed", mode = "symlink-each" }
"~/.zshenv"                  = "config/zsh/.zshenv"
"~/.config/zsh/.zshrc"       = "config/zsh/.zshrc"
"~/.config/zsh/aliases.zsh"  = "config/zsh/aliases.zsh"

# Imperative tail of `mise bootstrap`, run after the dotfiles and tools phases.
# Only the macOS GUI Brewfile is left here — every CLI tool, runtime, rust, and
# the aspire/claude-code CLIs are declarative mise [tools] now. Gated on `brew`,
# so Linux (no Homebrew) no-ops.
[tasks.bootstrap]
description = "Install macOS GUI apps from the Brewfile"
run = 'if command -v brew >/dev/null; then brew bundle --global; fi'
